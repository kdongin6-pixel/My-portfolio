<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>포트폴리오</title>
<!-- APP_VERSION: v0.3.0 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;font-size:15px;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,select,textarea{font-family:inherit;outline:none;color:#e6edf3}

.hdr{background:linear-gradient(160deg,#1e1b4b 0%,#0f172a 100%);padding:16px;border-bottom:1px solid #30363d}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hdr-title{font-size:1.15em;font-weight:800;color:#a5b4fc;letter-spacing:-.3px}
.sync-btn{background:rgba(99,102,241,.25);border:1px solid rgba(99,102,241,.5);color:#a5b4fc;padding:8px 14px;border-radius:10px;font-size:.82em;font-weight:700}

.asset-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.asset-card{background:rgba(255,255,255,.06);border:1px solid #30363d;border-radius:12px;padding:10px 12px}
.ac-lbl{font-size:.7em;color:#8b949e;margin-bottom:3px}
.ac-val{font-size:1.05em;font-weight:800;line-height:1.2}

.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.hdr-btn{flex:1;padding:9px 0;border-radius:10px;font-size:.82em;font-weight:700;text-align:center;min-width:90px}
.btn-bulk{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);color:#fbbf24}
.btn-add{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.4);color:#34d399}
.btn-export{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);color:#60a5fa}

.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;position:sticky;top:0;z-index:10;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:80px;padding:13px 4px;text-align:center;font-size:.82em;font-weight:700;color:#8b949e;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.tab.on{color:#a5b4fc;border-bottom-color:#6366f1;background:rgba(99,102,241,.06)}

.filters{display:flex;gap:8px;padding:12px 14px;background:#161b22;border-bottom:1px solid #30363d;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.flt{padding:7px 16px;border-radius:20px;font-size:.82em;font-weight:700;border:1px solid #30363d;color:#8b949e;white-space:nowrap;background:transparent}
.flt.on{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.5);color:#a5b4fc}
.rate-inp{background:rgba(255,255,255,.07);border:1px solid #30363d;border-radius:8px;padding:6px 10px;font-size:.82em;width:90px;margin-left:auto;flex-shrink:0}

.cards{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:14px;transition:.1s}
.card:active{transform:scale(.99);opacity:.9}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.card-name{font-size:1em;font-weight:800;color:#e6edf3;flex:1;line-height:1.3}
.card-pct{font-size:1em;font-weight:800;flex-shrink:0}
.card-chips{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.7em;font-weight:700}
.chip-m{background:rgba(99,102,241,.2);color:#a5b4fc}
.chip-i{background:rgba(16,185,129,.2);color:#34d399}
.chip-tag{border-radius:20px;cursor:pointer}
.chip-tag-edit{background:rgba(148,163,184,.15);color:#94a3b8;padding:2px 6px;border-radius:6px;font-size:.65em;cursor:pointer}

.card-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.cg-item{background:rgba(255,255,255,.04);border-radius:8px;padding:7px 9px}
.cg-lbl{font-size:.68em;color:#8b949e;margin-bottom:2px}
.cg-val{font-size:.88em;font-weight:700;color:#e6edf3}

.card-bottom{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.cur-wrap{display:flex;align-items:center;gap:5px;flex:1}
.cur-lbl{font-size:.75em;color:#8b949e;white-space:nowrap}
.cur-inp{background:rgba(255,255,255,.07);border:1px solid #30363d;border-radius:8px;padding:7px 10px;font-size:.88em;font-weight:700;color:#e6edf3;width:110px;text-align:right}
.card-btns{display:flex;gap:5px;flex-shrink:0}
.cbtn{padding:6px 11px;border-radius:8px;font-size:.78em;font-weight:800}
.cbtn-buy{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#10b981}
.cbtn-sell{background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.3);color:#f43f5e}
.cbtn-del{background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.2);color:#94a3b8;padding:6px 9px}
.cbtn-edit{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);color:#c084fc;padding:6px 9px}
.cbtn-undo{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#fbbf24;padding:5px 10px;font-size:.75em}

.sum-card{background:rgba(99,102,241,.08);border:2px solid rgba(99,102,241,.3);border-radius:14px;padding:14px;margin:0 12px 16px}

.pos{color:#10b981}
.neg{color:#f43f5e}

/* 현금 탭 */
.cash-wrap{padding:14px}
.cash-card{background:linear-gradient(135deg,#0c4a6e,#0e7490);border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid rgba(6,182,212,.3)}
.cash-curr{font-size:.85em;color:#a5f3fc;font-weight:700;margin-bottom:6px}
.cash-amt{font-size:1.6em;font-weight:800;color:#fff;margin-bottom:12px}
.cash-btns{display:flex;gap:8px}
.cash-btn{flex:1;padding:10px;border-radius:10px;font-size:.85em;font-weight:800}
.cash-btn-in{background:rgba(16,185,129,.3);border:1px solid rgba(16,185,129,.5);color:#fff}
.cash-btn-out{background:rgba(244,63,94,.3);border:1px solid rgba(244,63,94,.5);color:#fff}
.cash-section-title{font-size:.95em;font-weight:700;color:#a5b4fc;margin:16px 0 8px;padding:0 4px}
.cash-stat{background:rgba(255,255,255,.04);border:1px solid #30363d;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.cs-lbl{font-size:.82em;color:#8b949e}
.cs-val{font-size:.95em;font-weight:700}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.modal{background:#1c2128;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 18px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:1.05em;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;color:#e6edf3}
.modal-close{color:#8b949e;font-size:1.5em;padding:0 4px;background:none;border:none}
.field{margin-bottom:12px}
.field label{display:block;font-size:.78em;color:#8b949e;margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid #30363d;border-radius:10px;padding:11px 13px;font-size:.93em;color:#e6edf3;font-family:inherit}
.field textarea{min-height:120px;resize:vertical;font-family:monospace}
.mbtn{width:100%;padding:13px;border-radius:12px;font-size:.95em;font-weight:800;margin-top:4px}
.mbtn-pri{background:#6366f1;color:#fff;border:none}
.mbtn-sec{background:rgba(255,255,255,.07);color:#e6edf3;border:1px solid #30363d;margin-top:8px}
.mbtn-danger{background:rgba(244,63,94,.2);color:#f43f5e;border:1px solid rgba(244,63,94,.4);margin-top:8px}
.preview{background:rgba(255,255,255,.05);border-radius:10px;padding:11px;margin:10px 0}
.preview div{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #30363d;font-size:.85em}
.preview div:last-child{border-bottom:none;font-weight:700}

/* 태그 편집 모달 */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag-pick{padding:8px 14px;border-radius:20px;font-size:.82em;font-weight:700;border:2px solid transparent;cursor:pointer;transition:.15s}
.tag-pick.on{border-color:currentColor;transform:scale(1.05)}
.tag-manage{display:flex;gap:6px;margin-top:4px}
.tag-manage input{flex:1}
.tag-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:6px}
.tag-row-name{font-size:.88em;font-weight:600}
.tag-row-del{background:rgba(244,63,94,.15);color:#f43f5e;padding:4px 10px;border-radius:6px;font-size:.75em;font-weight:700}

.bulk-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(48,54,61,.6)}
.bulk-row:last-child{border-bottom:none}
.bulk-name{flex:1;font-size:.88em;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e6edf3}
.bulk-sub{font-size:.7em;color:#8b949e}
.bulk-inp{width:110px;background:rgba(255,255,255,.07);border:1px solid #30363d;border-radius:8px;padding:8px 10px;font-size:.88em;text-align:right;color:#e6edf3}

.chart-wrap{padding:16px}
.chart-box{max-width:300px;margin:0 auto 20px}
.legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:10px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px 12px}
.l-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.l-name{flex:1;font-size:.88em;color:#e6edf3;font-weight:600}
.l-pct{font-size:.88em;color:#8b949e;font-weight:700}

/* 트리맵 */
.treemap-container{position:relative;width:100%;height:0;padding-bottom:75%;border-radius:12px;overflow:hidden;background:#161b22;margin-bottom:16px}
.treemap-cell{position:absolute;box-sizing:border-box;border:2px solid rgba(13,17,23,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.tm-name{color:#fff;font-weight:800;text-align:center;padding:0 4px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.tm-pct{color:rgba(255,255,255,.85);font-weight:700;text-align:center}

.txn-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.txn{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:13px}
.txn-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:8px}
.txn-name{font-weight:800;font-size:.9em;flex:1}
.txn-date{font-size:.75em;color:#8b949e;flex-shrink:0}
.txn-det{font-size:.8em;color:#8b949e;margin-bottom:8px}
.txn-actions{display:flex;justify-content:flex-end}

.msg-sync{font-size:.8em;text-align:center;padding:8px;margin-bottom:10px;border-radius:8px}
.view-tog{background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.4);color:#a5b4fc;padding:7px 12px;border-radius:20px;font-size:.78em;font-weight:700;margin-left:auto;flex-shrink:0;white-space:nowrap}
.gs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 12px 14px}
.gs-tbl{width:100%;border-collapse:collapse}
.gs-th{padding:7px 8px;font-size:.65em;font-weight:700;color:#8b949e;text-align:right;white-space:nowrap;background:#21262d;border-bottom:2px solid #30363d}
.gs-th:first-child{text-align:left;position:sticky;left:0;background:#21262d;z-index:6;min-width:122px;max-width:148px}
.gs-th:last-child{text-align:center;width:28px}
.gs-td{padding:5px 8px;font-size:.8em;text-align:right;vertical-align:middle;color:#e6edf3}
.gs-td:first-child{position:sticky;left:0;z-index:1;text-align:left;min-width:122px;max-width:148px;overflow:hidden}
.gs-r1 .gs-td{background:#161b22;font-weight:700;border-top:1px solid #21262d}
.gs-r1 .gs-td:first-child{background:#161b22}
.gs-r2 .gs-td{background:#1a1f26;border-bottom:2px solid #21262d}
.gs-r2 .gs-td:first-child{background:#1a1f26}
.gs-r2 .gs-td:not(:first-child){font-size:.74em;color:#8b949e;font-weight:600}
.gs-r2 .gs-td.pos,.gs-r1 .gs-td.pos{color:#10b981}
.gs-r2 .gs-td.neg,.gs-r1 .gs-td.neg{color:#f43f5e}
.gs-sum .gs-td{background:rgba(253,224,71,.07);border-top:2px solid #30363d;font-weight:800;font-size:.8em;color:#fbbf24}
.gs-sum .gs-td:first-child{background:rgba(253,224,71,.07);color:#fbbf24}
.gs-name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.gs-more{background:rgba(255,255,255,.06);border:1px solid #30363d;border-radius:5px;color:#8b949e;padding:2px 7px;font-size:.9em;cursor:pointer;display:block;margin:0 auto}
.empty{padding:50px 20px;text-align:center;color:#8b949e;font-size:.9em;line-height:1.6}

/* 📈 추이 탭 */
.trend-wrap{padding:14px}
.trend-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.ts-item{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:12px;padding:10px 12px}
.ts-lbl{font-size:.7em;color:#8b949e;margin-bottom:3px}
.ts-val{font-size:.95em;font-weight:800;line-height:1.2}
.trend-chart-box{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:14px;margin-bottom:12px}
.trend-chart-title{font-size:.85em;font-weight:700;color:#a5b4fc;margin-bottom:10px;padding:0 4px}

/* 📓 일지 탭 */
.journal-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.journal-item{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:13px}
.journal-head{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.journal-cat{font-size:.72em;padding:3px 9px;border-radius:6px;font-weight:700}
.journal-stock{font-size:.82em;font-weight:800;color:#a5b4fc}
.journal-date{font-size:.72em;color:#8b949e;margin-left:auto}
.journal-content{font-size:.88em;color:#e6edf3;line-height:1.5;white-space:pre-wrap;margin-bottom:8px}
.journal-actions{display:flex;justify-content:flex-end}

/* 🌐 시장 */
.mkt-wrap{padding:12px}
.mkt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mkt-badge{font-size:.78em;font-weight:700;padding:4px 10px;border-radius:20px}
.mkt-section{margin-bottom:12px}
.mkt-section-title{font-size:.7em;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;padding:0 2px}
.mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mkt-grid-3{grid-template-columns:1fr 1fr 1fr}
.mkt-grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.mkt-item{background:#161b22;border:1px solid #30363d;border-radius:9px;padding:7px 8px}
.mkt-item-lbl{font-size:.65em;color:#8b949e;margin-bottom:2px;font-weight:700}
.mkt-item-price{font-size:.83em;font-weight:800;color:#e6edf3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mkt-item-chgs{display:flex;gap:3px;flex-wrap:wrap}
.mkt-chg{font-size:.65em;font-weight:700;padding:1px 4px;border-radius:3px}
.mkt-pos{background:rgba(16,185,129,.15);color:#10b981}
.mkt-neg{background:rgba(244,63,94,.15);color:#f43f5e}
.mkt-neu{background:rgba(148,163,184,.1);color:#8b949e}
.mkt-chg-w{opacity:.8}
.mkt-refresh-btn{background:none;border:none;color:#8b949e;font-size:.9em;cursor:pointer;padding:0 3px}

/* 테이블 서브텍스트 */
.gs-sub{font-size:.7em;color:#8b949e;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

/* ── 시장탭 재디자인 ── */
.mkt2-wrap{padding:10px 12px}
.mkt2-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mkt2-section{margin-bottom:14px}
.mkt2-stitle{font-size:.7em;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-left:2px}
.mkt2-idx-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mkt2-idx-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:10px;overflow:hidden}
.mkt2-idx-name{font-size:.65em;color:#8b949e;font-weight:700;margin-bottom:2px}
.mkt2-idx-price{font-size:.98em;font-weight:800;color:#e6edf3;white-space:nowrap;margin-bottom:4px}
.mkt2-idx-bottom{display:flex;justify-content:space-between;align-items:flex-end}
.mkt2-idx-badges{display:flex;flex-direction:column;gap:2px}
.mkt2-sent-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mkt2-vix-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:10px}
.mkt2-vix-lbl{font-size:.65em;color:#8b949e;font-weight:700;margin-bottom:2px}
.mkt2-vix-price{font-size:1.1em;font-weight:800;color:#e6edf3;margin-bottom:4px}
.mkt2-fg-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:10px;display:flex;align-items:center;justify-content:center}
.mkt2-rate-item{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.mkt2-rate-label{font-size:.75em;font-weight:700;color:#8b949e;flex-shrink:0;min-width:80px}
.mkt2-rate-right{display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end}
.mkt2-rate-price{font-size:.9em;font-weight:800;color:#e6edf3;white-space:nowrap}
.mkt2-rate-spark{flex-shrink:0}
.mkt2-comm-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.mkt2-comm-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:8px;overflow:hidden}
.mkt2-comm-lbl{font-size:.62em;color:#8b949e;font-weight:700;margin-bottom:2px}
.mkt2-comm-price{font-size:.82em;font-weight:800;color:#e6edf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mkt2-etf-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.mkt2-etf-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:8px 7px}
.mkt2-etf-lbl{font-size:.62em;color:#8b949e;font-weight:700;margin-bottom:2px}
.mkt2-etf-price{font-size:.82em;font-weight:800;color:#e6edf3;margin-bottom:3px}
.mkt2-tech-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mkt2-tech-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
.mkt2-tech-left{min-width:0}
.mkt2-tech-lbl{font-size:.68em;color:#8b949e;font-weight:700}
.mkt2-tech-price{font-size:.88em;font-weight:800;color:#e6edf3;white-space:nowrap}
.mkt2-chg-badge{display:inline-block;font-size:.62em;font-weight:700;padding:1px 5px;border-radius:4px}
.mkt2-pos{background:rgba(16,185,129,.15);color:#10b981}
.mkt2-neg{background:rgba(244,63,94,.15);color:#f43f5e}
.mkt2-neu{background:rgba(148,163,184,.1);color:#8b949e}
.mkt2-w{opacity:.8}

/* 현금 인라인 토글 */
.cash-toggle-btn{width:100%;padding:9px 12px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:10px;color:#a5f3fc;font-size:.82em;font-weight:700;margin-top:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.cash-inline{padding:0}
.cash-card-sm{background:linear-gradient(135deg,#0c4a6e,#0e7490);border-radius:12px;padding:12px 14px;border:1px solid rgba(6,182,212,.3)}

<script>
// ═══════════════════════════════════════════

const TC_DEFAULT={"성장주":"#6366f1","방어주":"#10b981","중소형주":"#f59e0b","현금/채권":"#06b6d4","기타":"#94a3b8"};

// API URL is stored in localStorage only — never in source code
function getApiUrl(){return localStorage.getItem('pf_api_url')||'';}

const APP_VERSION="v0.3.0";

let _chartInstances=[];
function destroyCharts(){_chartInstances.forEach(c=>{try{c.destroy();}catch(e){}});_chartInstances=[];}
let _mktFetchTime=0;

const MARKET_CFG=[

let S={

  cash:{메리츠증권:{USD:0,KRW:0},ISA:{USD:0,KRW:0}},  
  cashTxns:[],  
  txns:[],

  jFilter:"전체",

// SEED block removed — portfolio data loaded from cloud only

function load(){
  try{
    const d=JSON.parse(localStorage.getItem("pf_v3")||"null");
    if(d){
      S.stocks=(d.stocks||[]).filter(s=>s&&s.name).map(s=>({
        ...s,
        qty:Number(s.qty)||0,
        avg:Number(s.avg)||0,
        cur:Number(s.cur)||0
      }));
      S.cash=d.cash||{메리츠증권:{USD:0,KRW:0},ISA:{USD:0,KRW:0}};
      for(const acct in S.cash){
        if(!S.cash[acct])S.cash[acct]={USD:0,KRW:0};
        S.cash[acct].USD=Number(S.cash[acct].USD)||0;
        S.cash[acct].KRW=Number(S.cash[acct].KRW)||0;
      }
      S.cashTxns=d.cashTxns||[];
      S.txns=d.txns||[];
      S.snapshots=(d.snapshots||[]).filter(s=>s&&!isNaN(s.totalKRW));
      S.intradaySnaps=d.intradaySnaps||[];
      S.journal=d.journal||[];
      S.tags=d.tags||[...DEFAULT_TAGS];
      S.tagColors=d.tagColors||{...TC_DEFAULT};
      S.rate=Number(d.rate)||1510;
    }else{
      migrateFromV2();
    }
  }catch(e){
    console.error("load error",e);
    migrateFromV2();
  }
}

function migrateFromV2(){
  try{
    const v2=JSON.parse(localStorage.getItem("pf_v2")||"null");
    if(v2&&v2.stocks){
      v2.stocks.forEach(s=>{
        if(s.name.includes("현금")||s.name.includes("💵")){
          if(!S.cash[s.acct])S.cash[s.acct]={USD:0,KRW:0};
          S.cash[s.acct][s.curr]+=s.qty*s.avg;
        }else{
          S.stocks.push(s);
        }
      });
      S.txns=v2.txns||[];
      S.rate=v2.rate||1510;
      save();
      return;
    }
  }catch(e){}
  // Fresh install — start empty, data will load from cloud
  S.cash={메리츠증권:{USD:0,KRW:0},ISA:{USD:0,KRW:0}};
  save();
}

function updateIntradaySnap(){
  if(!S.stocks||!S.stocks.length)return;
  const now=new Date();
  if(S.intradaySnaps.length>0){
    const last=new Date(S.intradaySnaps[S.intradaySnaps.length-1].dt);
    if(now-last<30*60*1000)return;
  }
  const stockKRW=S.stocks.reduce((a,s)=>a+(s.curr==="USD"?s.qty*s.cur*S.rate:s.qty*s.cur),0);
  const cashKRW=Object.values(S.cash).reduce((a,c)=>a+(c.USD||0)*S.rate+(c.KRW||0),0);
  const inv=S.stocks.reduce((a,s)=>a+(s.curr==="USD"?s.qty*s.avg*S.rate:s.qty*s.avg),0);
  const pnl=stockKRW-inv;
  const pct=inv>0?pnl/inv*100:0;
  S.intradaySnaps.push({dt:now.toISOString(),totalKRW:Math.round(stockKRW+cashKRW),pct:Number(pct.toFixed(2))});
  const cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-2);
  S.intradaySnaps=S.intradaySnaps.filter(s=>new Date(s.dt)>=cutoff);
}

function save(){
  updateTodaySnapshot();
  updateIntradaySnap();
  localStorage.setItem("pf_v3",JSON.stringify({
    stocks:S.stocks,cash:S.cash,cashTxns:S.cashTxns,txns:S.txns,
    snapshots:S.snapshots,intradaySnaps:S.intradaySnaps,journal:S.journal,
    tags:S.tags,tagColors:S.tagColors,rate:S.rate
  }));
  scheduleCloudSave();
}

// ═══════════════════════════════════════════
// 일간 스냅샷
// ═══════════════════════════════════════════
function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function updateTodaySnapshot(){
  if(!S.stocks||!S.stocks.length)return;
  const today=todayKey();
  const stockKRW=S.stocks.reduce((a,s)=>a+(s.curr==="USD"?s.qty*s.cur*S.rate:s.qty*s.cur),0);
  const inv=S.stocks.reduce((a,s)=>a+(s.curr==="USD"?s.qty*s.avg*S.rate:s.qty*s.avg),0);
  const cashKRW=Object.values(S.cash).reduce((a,c)=>a+(c.USD||0)*S.rate+(c.KRW||0),0);
  const pnl=stockKRW-inv;
  const pct=inv>0?pnl/inv*100:0;
  const byStock={};
  S.stocks.forEach(s=>{byStock[s.name]=Math.round(s.curr==="USD"?s.qty*s.cur*S.rate:s.qty*s.cur);});
  
  const snap={date:today,totalKRW:Math.round(stockKRW+cashKRW),stockKRW:Math.round(stockKRW),
    cashKRW:Math.round(cashKRW),pnl:Math.round(pnl),pct:Number(pct.toFixed(2)),rate:S.rate,byStock};
  const idx=S.snapshots.findIndex(x=>x.date===today);
  if(idx>=0)S.snapshots[idx]=snap;
  else S.snapshots.push(snap);
  S.snapshots.sort((a,b)=>a.date.localeCompare(b.date));
  
  const cutoff=new Date();cutoff.setFullYear(cutoff.getFullYear()-1);
  const cutoffStr=cutoff.toISOString().slice(0,10);
  S.snapshots=S.snapshots.filter(x=>x.date>=cutoffStr);
}

// ═══════════════════════════════════════════
// 클라우드 동기화 (Google Sheets에 저장)
// ═══════════════════════════════════════════
function scheduleCloudSave(){
  if(S.autoSyncTimer)clearTimeout(S.autoSyncTimer);
  S.autoSyncTimer=setTimeout(saveToCloud,2000);
}

async function saveToCloud(){
  const _url=getApiUrl();
  if(!_url){S.cloudStatus="error";S.syncMsg="❌ API URL 미설정 — ⚙️ 설정에서 입력해주세요";renderCloudBadge();return;}
  S.cloudStatus="saving";renderCloudBadge();
  try{
    const payload={
      stocks:S.stocks,cash:S.cash,cashTxns:S.cashTxns,txns:S.txns,
      snapshots:S.snapshots,intradaySnaps:S.intradaySnaps,journal:S.journal,
      tags:S.tags,tagColors:S.tagColors,rate:S.rate,
      updatedAt:new Date().toISOString()
    };
    await fetch(_url,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    S.cloudStatus="saved";
    S.lastCloudSync=new Date();
  }catch(e){
    S.cloudStatus="error";
    console.error("Cloud save error:",e);
  }
  renderCloudBadge();
}

async function loadFromCloud(showAlert){
  const _url=getApiUrl();
  if(!_url){S.cloudStatus="error";S.syncMsg="❌ API URL 미설정 — ⚙️ 설정에서 입력해주세요";if(showAlert)render();else renderCloudBadge();return;}
  S.cloudStatus="saving";renderCloudBadge();
  try{
    const res=await fetch(_url);
    if(!res.ok)throw new Error("로드 실패");
    const data=await res.json();
    
    let priceCount=0;
    if(data.rate&&data.rate>0)S.rate=data.rate;
    // appData 없을 때만 여기서 가격 적용 (있으면 아래 appData 블록에서 처리)
    if(!data.appData){
      (data.meritz||[]).forEach(item=>{
        const s=S.stocks.find(x=>x.name===item.name&&x.acct==='메리츠증권');
        if(s){if(item.cur>0){s.cur=item.cur;priceCount++;}if(item.ticker)s.ticker=item.ticker;}
      });
      (data.isa||[]).forEach(item=>{
        const s=S.stocks.find(x=>x.name===item.name&&x.acct==='ISA');
        if(s){if(item.cur>0){s.cur=item.cur;priceCount++;}if(item.ticker)s.ticker=item.ticker;}
      });
    }

    if(data.appData){
      const a=data.appData;
      if(a.cash)S.cash=a.cash;
      if(a.cashTxns)S.cashTxns=a.cashTxns;
      if(a.txns)S.txns=a.txns;
      // 스냅샷: 로컬+클라우드 병합 (로컬 우선 — 덮어쓰면 오늘치 소실)
      if(a.snapshots){
        const merged={};
        (a.snapshots||[]).forEach(s=>{merged[s.date]=s;});
        S.snapshots.forEach(s=>{merged[s.date]=s;}); // 로컬이 더 최신
        S.snapshots=Object.values(merged).sort((a,b)=>a.date.localeCompare(b.date));
      }
      if(a.intradaySnaps){
        const imap=new Map();
        (a.intradaySnaps||[]).forEach(s=>imap.set(s.dt,s));
        (S.intradaySnaps||[]).forEach(s=>imap.set(s.dt,s));
        S.intradaySnaps=[...imap.values()].sort((a,b)=>new Date(a.dt)-new Date(b.dt));
      }
      if(a.journal)S.journal=a.journal;
      if(a.tags)S.tags=a.tags;
      if(a.tagColors)S.tagColors=a.tagColors;
      if(a.rate)S.rate=a.rate;
      // 현재가·티커 업데이트 (수량·평단가 건드리지 않음)
      (data.meritz||[]).forEach(item=>{
        const s=S.stocks.find(x=>x.name===item.name&&x.acct==='메리츠증권');
        if(s){if(item.cur>0){s.cur=item.cur;priceCount++;}if(item.ticker)s.ticker=item.ticker;}
      });
      (data.isa||[]).forEach(item=>{
        const s=S.stocks.find(x=>x.name===item.name&&x.acct==='ISA');
        if(s){if(item.cur>0){s.cur=item.cur;priceCount++;}if(item.ticker)s.ticker=item.ticker;}
      });
      // 클라우드 가격 반영 후 오늘 스냅샷 갱신
      updateTodaySnapshot();
      updateIntradaySnap();
      localStorage.setItem("pf_v3",JSON.stringify({
        stocks:S.stocks,cash:S.cash,cashTxns:S.cashTxns,txns:S.txns,
        snapshots:S.snapshots,intradaySnaps:S.intradaySnaps,journal:S.journal,
        tags:S.tags,tagColors:S.tagColors,rate:S.rate
      }));
    }
    
    S.cloudStatus="saved";
    S.lastCloudSync=new Date();
    S.syncMsg=`✅ ${priceCount}개 가격 및 티커 동기화 완료 (${new Date().toLocaleTimeString()})`;
    if(showAlert)render();
    else renderCloudBadge();
  }catch(e){
    S.cloudStatus="error";
    S.syncMsg=`❌ ${e.message}`;
    if(showAlert)render();
    else renderCloudBadge();
  }
}

function renderCloudBadge(){
  const el=document.getElementById("cloudBadge");
  if(!el)return;
  const icons={saving:"⏳",saved:"☁️",error:"⚠️","":"☁️"};
  const colors={saving:"#fbbf24",saved:"#10b981",error:"#f43f5e","":"#8b949e"};
  const labels={
    saving:"동기화 중",
    saved:S.lastCloudSync?`${Math.floor((Date.now()-S.lastCloudSync)/1000)}초 전`:"동기화됨",
    error:"동기화 실패",
    "":"준비 중"
  };
  el.style.color=colors[S.cloudStatus]||"#8b949e";
  el.textContent=`${icons[S.cloudStatus]||"☁️"} ${labels[S.cloudStatus]||"준비 중"}`;
}

setInterval(renderCloudBadge,30000);

function getMarketStatus(){
  const now=new Date();
  const day=now.getUTCDay();
  const mins=now.getUTCHours()*60+now.getUTCMinutes();
  // EDT (UTC-4): 9:30-16:00 ET = 13:30-20:00 UTC (summer)
  const usOpen=day>=1&&day<=5&&mins>=13*60+30&&mins<20*60;
  // KST (UTC+9): 9:00-15:30 = 0:00-6:30 UTC
  const krOpen=day>=1&&day<=5&&mins<6*60+30;
  if(usOpen)return{label:"🟢 미장 개장",color:"#10b981",bg:"rgba(16,185,129,.15)"};
  if(krOpen)return{label:"🔵 한국장 개장",color:"#60a5fa",bg:"rgba(59,130,246,.15)"};
  return{label:"⚫ 휴장",color:"#8b949e",bg:"rgba(148,163,184,.1)"};
}

function fmtMktPrice(price,fmt){
  if(price===null||price===undefined||price===0&&fmt!=="pct"&&fmt!=="dec")return"—";
  if(fmt==="num")return Math.round(price).toLocaleString();
  if(fmt==="krw")return Math.round(price).toLocaleString();
  if(fmt==="usd")return"$"+price.toFixed(2);
  if(fmt==="dec")return price.toFixed(2);
  if(fmt==="pct")return price.toFixed(2)+"%";
  return price.toFixed(2);
}

async function loadMarketData(force=false){
  if(S.marketLoading)return;
  const now=Date.now();
  if(!force&&_mktFetchTime&&now-_mktFetchTime<5*60*1000)return;
  const _url=getApiUrl();
  if(!_url){
    // No API URL — show empty state without retrying
    S.marketData=[];
    if(S.tab==="market")render();
    return;
  }
  S.marketLoading=true;
  if(S.tab==="market")render();
  try{
    const res=await fetch(_url+"?mode=market");
    if(!res.ok)throw new Error("시장 데이터 로드 실패");
    const data=await res.json();
    S.marketData=data.market||[];
    _mktFetchTime=Date.now();
  }catch(e){
    console.error("Market data error:",e);
    _mktFetchTime=Date.now(); // Throttle retries on error (5 min cooldown)
  }
  S.marketLoading=false;
  if(S.tab==="market")render();
}

const fK=n=>Math.round(n).toLocaleString("ko-KR");
const fKShort=n=>{const a=Math.abs(n),s=n<0?'-':'';return a>=100000000?s+'₩'+(a/100000000).toFixed(1)+'억':a>=10000?s+'₩'+Math.round(a/10000)+'만':s+'₩'+fK(a);};
const fU=n=>n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fP=n=>(n>=0?"+":"")+n.toFixed(2)+"%";
const fM=(v,c)=>c==="USD"?"$"+fU(v):"₩"+fK(v);
const evK=s=>(s.curr==="USD"?s.qty*s.cur*S.rate:s.qty*s.cur);
const totK=list=>list.reduce((a,s)=>a+evK(s),0);
const filt=()=>S.acct==="전체"?S.stocks:S.stocks.filter(s=>s.acct===S.acct);
const cashTotKRW=()=>{
  let t=0;
  for(const acct of Object.keys(S.cash)){
    t+=S.cash[acct].USD*S.rate+S.cash[acct].KRW;
  }
  return t;
};
const filtCashKRW=()=>{
  if(S.acct==="전체")return cashTotKRW();
  const c=S.cash[S.acct]||{USD:0,KRW:0};
  return c.USD*S.rate+c.KRW;
};

// ═══════════════════════════════════════════
function execTrade(id,mode,qty,price){
  const s=S.stocks.find(x=>x.id===id);
  const q=parseFloat(qty),p=parseFloat(price);
  if(!s||isNaN(q)||isNaN(p)||q<=0||p<=0)return alert("수량/가격 확인");
  const cost=q*p;
  const oldQty=s.qty,oldAvg=s.avg;
  let pnl=0,cashChange=0;
  
  if(!S.cash[s.acct])S.cash[s.acct]={USD:0,KRW:0};
  
  if(mode==="buy"){
    if(S.cash[s.acct][s.curr]<cost){
      if(!confirm(`현금 부족! 현재 ${fM(S.cash[s.acct][s.curr],s.curr)}\n그래도 진행할까요?`))return;
    }
    const curQty=Number(s.qty)||0,curAvg=Number(s.avg)||0;
    const tot=curQty*curAvg+q*p;
    s.qty=curQty+q;
    s.avg=s.qty>0?tot/s.qty:0;
    S.cash[s.acct][s.curr]-=cost;
    cashChange=-cost;
  }else{
    if(q>s.qty)return alert("보유수량 초과");
    pnl=(p-s.avg)*q;
    s.qty-=q;
    S.cash[s.acct][s.curr]+=cost;
    cashChange=cost;
  }
  
  S.txns.unshift({
    id:Date.now(),stockId:id,name:s.name,acct:s.acct,curr:s.curr,
    mode,qty:q,price:p,pnl,cashChange,
    prevQty:oldQty,prevAvg:oldAvg,
    date:new Date().toLocaleDateString("ko-KR"),
    time:new Date().toLocaleTimeString("ko-KR")
  });
  save();S.modal=null;render();
}

function undoTrade(txnId){
  const t=S.txns.find(x=>x.id===txnId);
  if(!t)return;
  if(!confirm(`'${t.name}' ${t.mode==='buy'?'매수':'매도'} ${t.qty}주를 취소할까요?\n거래 기록이 완전히 삭제됩니다.`))return;
  
  const s=S.stocks.find(x=>x.id===t.stockId);
  if(s){
    const pq=Number(t.prevQty),pa=Number(t.prevAvg);
    if(!isNaN(pq)&&!isNaN(pa)){
      s.qty=pq;
      s.avg=pa;
    }else{
      alert("이 거래는 평단가 복원 정보가 없어요.\n거래 기록만 삭제합니다.");
    }
  }
  if(!S.cash[t.acct])S.cash[t.acct]={USD:0,KRW:0};
  const cc=Number(t.cashChange);
  if(!isNaN(cc))S.cash[t.acct][t.curr]-=cc;
  
  S.txns=S.txns.filter(x=>x.id!==txnId);
  save();render();
}

// ═══════════════════════════════════════════
// 현금 입출금
// ═══════════════════════════════════════════
function execCash(acct,curr,mode,amount,memo){
  const a=parseFloat(amount);
  if(isNaN(a)||a<=0)return alert("금액 확인");
  if(!S.cash[acct])S.cash[acct]={USD:0,KRW:0};
  if(mode==="out"&&S.cash[acct][curr]<a){
    if(!confirm(`현금 부족! 현재 ${fM(S.cash[acct][curr],curr)}\n그래도 진행할까요?`))return;
  }
  
  S.cash[acct][curr]+=mode==="in"?a:-a;
  S.cashTxns.unshift({
    id:Date.now(),acct,curr,mode,amount:a,memo:memo||"",
    date:new Date().toLocaleDateString("ko-KR"),
    time:new Date().toLocaleTimeString("ko-KR")
  });
  save();S.modal=null;render();
}

function undoCashTxn(txnId){
  const t=S.cashTxns.find(x=>x.id===txnId);
  if(!t||!confirm(`${t.mode==='in'?'입금':'출금'} ${fM(t.amount,t.curr)} 취소할까요?`))return;
  if(!S.cash[t.acct])S.cash[t.acct]={USD:0,KRW:0};
  S.cash[t.acct][t.curr]+=t.mode==="in"?-t.amount:t.amount;
  S.cashTxns=S.cashTxns.filter(x=>x.id!==txnId);
  save();render();
}

function render(){
  destroyCharts();
  const app=document.getElementById("app");
  app.innerHTML="";
  if(S.tab==="cash")S.tab="list";
  app.appendChild(mkHdr());
  app.appendChild(mkTabs());
  if(S.tab==="list")app.appendChild(mkList());
  if(S.tab==="chart")app.appendChild(mkChart());
  if(S.tab==="trend")app.appendChild(mkTrend());
  if(S.tab==="market")app.appendChild(mkMarket());
  if(S.tab==="journal")app.appendChild(mkJournal());
  if(S.tab==="txn")app.appendChild(mkTxn());
  if(S.modal)app.appendChild(mkModal());
  bind();
  if(S.tab==="chart")drawChart();
  if(S.tab==="list"&&S.showTrend)drawTrend();
  if(S.tab==="trend")drawTrend();
}

function mkList(){

  const pct=inv>0?pnl/inv*100:0;
  const d=document.createElement("div");

  // 정렬
  const sorted=[...fl].sort((a,b)=>{
    const aInvK=a.curr==="USD"?a.qty*a.avg*S.rate:a.qty*a.avg;
    const bInvK=b.curr==="USD"?b.qty*b.avg*S.rate:b.qty*b.avg;
    const aEvK=evK(a),bEvK=evK(b);
    let av=0,bv=0;
    if(S.sortBy==="eval"){av=aEvK;bv=bEvK;}
    else if(S.sortBy==="pct"){av=aInvK>0?(aEvK-aInvK)/aInvK:0;bv=bInvK>0?(bEvK-bInvK)/bInvK:0;}
    else if(S.sortBy==="pnl"){av=aEvK-aInvK;bv=bEvK-bInvK;}
    else if(S.sortBy==="wt"){av=aEvK;bv=bEvK;}
    return S.sortDir==="desc"?bv-av:av-bv;

const STOCK_PALETTE=["#f87171","#fb923c","#fbbf24","#a3e635","#4ade80","#34d399",
  "#2dd4bf","#38bdf8","#60a5fa","#818cf8","#a78bfa","#e879f9",
  "#f472b6","#fb7185","#fcd34d","#bbf7d0","#99f6e4","#bae6fd"];

function squarify(items,x0,y0,x1,y1){
  const out=[];
  function lay(nodes,x0,y0,x1,y1){
    if(!nodes.length)return;
    if(nodes.length===1){out.push({...nodes[0],x:x0,y:y0,w:x1-x0,h:y1-y0});return;}
    const W=x1-x0,H=y1-y0,horiz=W>=H,short=horiz?H:W;
    const total=nodes.reduce((s,n)=>s+n.v,0);
    let row=[],rowV=0,prev=Infinity,split=0;
    for(let i=0;i<nodes.length;i++){
      const n=nodes[i],nv=rowV+n.v;
      const rLen=(horiz?W:H)*nv/total;
      let worst=0;
      [...row,n].forEach(m=>{const cl=short*m.v/nv;worst=Math.max(worst,Math.max(rLen/cl,cl/rLen));});
      if(worst<=prev){row.push(n);rowV=nv;prev=worst;split=i+1;}
      else break;
    }
    const rLen=(horiz?W:H)*rowV/total;
    let off=horiz?y0:x0;
    row.forEach(n=>{
      const cl=short*n.v/rowV;
      if(horiz){out.push({...n,x:x0,y:off,w:rLen,h:cl});off+=cl;}
      else{out.push({...n,x:off,y:y0,w:cl,h:rLen});off+=cl;}
    });
    const rest=nodes.slice(split);
    if(rest.length){if(horiz)lay(rest,x0+rLen,y0,x1,y1);else lay(rest,x0,y0+rLen,x1,y1);}
  }
  lay(items,x0,y0,x1,y1);
  return out;
}

function drawTreemap(fl,tot){
  let items;
  if(S.wMode==="tag"){
    const m={},mc={};
    fl.forEach((s,i)=>{const t=s.tag||"기타";m[t]=(m[t]||0)+evK(s);if(!mc[t])mc[t]=S.tagColors[t]||STOCK_PALETTE[Object.keys(m).length%STOCK_PALETTE.length];});
    items=Object.entries(m).map(([name,v])=>({name,v,color:mc[name]}));
  }else{
    items=fl.map((s,i)=>({name:s.name,ticker:(s.ticker&&s.curr==="USD")?s.ticker:null,v:evK(s),color:STOCK_PALETTE[i%STOCK_PALETTE.length]}));
  }
  items=items.filter(i=>i.v>0).sort((a,b)=>b.v-a.v);
  if(!items.length)return;
  const W=400,H=300;
  const rects=squarify(items,0,0,W,H);
  const container=document.getElementById("treemap-container");
  if(!container)return;
  rects.forEach(r=>{
    const pct=tot>0?r.v/tot*100:0;
    const cell=document.createElement("div");
    cell.className="treemap-cell";
    cell.style.cssText=`left:${(r.x/W*100).toFixed(3)}%;top:${(r.y/H*100).toFixed(3)}%;width:${(r.w/W*100).toFixed(3)}%;height:${(r.h/H*100).toFixed(3)}%;background:${r.color}`;
    const minDim=Math.min(r.w/W*100,r.h/H*100);
    cell.title=r.name;
    if(minDim>6){
      const fs=Math.max(0.55,Math.min(0.9,minDim/12));
      const nm=r.ticker||r.name.slice(0,minDim>12?10:7)+(r.name.length>(minDim>12?10:7)?'…':'');
      cell.innerHTML=`<div class="tm-name" style="font-size:${fs}em">${nm}</div><div class="tm-pct" style="font-size:${(fs*0.88).toFixed(2)}em">${pct.toFixed(1)}%</div>`;
    }
    container.appendChild(cell);
  });
}

function drawChart(){
  const fl=filt(),tot=totK(fl);
  if(S.chartView==="treemap"){drawTreemap(fl,tot);return;}
  let labels=[],vals=[],colors=[];
  if(S.wMode==="stock"){
    fl.forEach((s,i)=>{labels.push(s.name);vals.push(evK(s));colors.push(STOCK_PALETTE[i%STOCK_PALETTE.length]);});
  }else{
    const m={};fl.forEach(s=>{const t=s.tag||"기타";m[t]=(m[t]||0)+evK(s);});
    Object.entries(m).forEach(([t,v])=>{labels.push(t);vals.push(v);colors.push(S.tagColors[t]||"#94a3b8");});
  }
  const ctx=document.getElementById("donut");
  if(!ctx||!labels.length)return;
  const ch=new Chart(ctx,{type:"doughnut",data:{labels,datasets:[{data:vals,backgroundColor:colors.map(c=>c+"99"),borderColor:colors,borderWidth:2}]},
    options:{cutout:"65%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`₩${fK(c.parsed)} (${(c.parsed/tot*100).toFixed(1)}%)`}}}}});
  _chartInstances.push(ch);
  const lg=document.getElementById("legend");
  labels.forEach((l,i)=>{

    el.innerHTML=`<div class="l-dot" style="background:${colors[i]}"></div><div class="l-name">${l}</div><div class="l-pct">${(tot>0?vals[i]/tot*100:0).toFixed(1)}%</div>`;

  });
}

      </div>`;

  }

  if(!S.snapshots||S.snapshots.length<1){
    d.innerHTML=`<div class="filters">${btns}</div>
      <div class="empty">📭 스냅샷 데이터가 없어요<br><br><span style="font-size:.85em">매일 페이지에 한 번씩 방문하면<br>자동으로 기록돼서 추이를 볼 수 있어요</span></div>`;
    return d;
  }

  const now=new Date();
  let cutoff=new Date(0);
  if(S.trendPeriod==="1W"){cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-7);}
  else if(S.trendPeriod==="1M"){cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-1);}
  else if(S.trendPeriod==="3M"){cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-3);}
  else if(S.trendPeriod==="1Y"){cutoff=new Date(now);cutoff.setFullYear(cutoff.getFullYear()-1);}

  const cutoffStr=cutoff.toISOString().slice(0,10);
  const filtered=S.snapshots.filter(s=>s.date>=cutoffStr);

  let summary='';
  if(filtered.length>=2){
    const first=filtered[0],last=filtered[filtered.length-1];

    summary=`<div class="trend-summary">

      <div class="ts-item"><div class="ts-lbl">기간 변화</div><div class="ts-val ${change>=0?'pos':'neg'}">${change>=0?'+':''}₩${fK(change)}</div></div>
      <div class="ts-item"><div class="ts-lbl">기간 수익률</div><div class="ts-val ${changePct>=0?'pos':'neg'}">${fP(changePct)}</div></div>
    </div>`;
  }

  d.innerHTML=`

  return d;
}

// 🌐 시장 탭 헬퍼
// ═══════════════════════════════════════════
function mkSparkSvg(weekly,daily,key,w,h){
  if(!w)w=68;if(!h)h=26;
  const up=(weekly||0)>=0;
  const col=up?'#10b981':'#f43f5e';
  const mag=Math.min(Math.abs(weekly||0),5)/5;
  let seed=0;
  for(let i=0;i<(key||'X').length;i++)seed=(seed*31+(key.charCodeAt(i)||0))&0xffff;
  const pts=[];
  for(let i=0;i<9;i++){
    seed=(seed*1664525+1013904223)&0xffff;
    const noise=((seed%100)/100-.5)*h*.42*(1-mag*.35);
    const baseY=h/2+(up?-1:1)*(i-4)*mag*h*.1;
    pts.push([Math.round(i*(w/8)),Math.max(2,Math.min(h-2,Math.round(baseY+noise)))]);
  }
  const line=pts.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join('');
  const fill='M'+pts[0][0]+','+h+' '+pts.map(p=>'L'+p[0]+','+p[1]).join(' ')+' L'+pts[pts.length-1][0]+','+h+'Z';
  const gid='sg'+(seed%9999);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".22"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><path d="${fill}" fill="url(#${gid})"/><path d="${line}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function vixToFG(vix){
  if(!vix||vix<=0)return{score:50,label:'중립',color:'#eab308'};
  const score=Math.max(0,Math.min(100,Math.round(110-vix*3)));
  const col=score>=75?'#10b981':score>=55?'#84cc16':score>=45?'#eab308':score>=25?'#f97316':'#ef4444';
  const label=score>=75?'극단적 탐욕':score>=55?'탐욕':score>=45?'중립':score>=25?'공포':'극단적 공포';
  return{score,label,color:col};
}

function mkGaugeSvg(score,label,color){
  const cx=60,cy=52,ro=38,ri=24;
  const a=s=>((s/100*180)-180)*Math.PI/180;
  const seg=(f,t,c)=>{
    const a1=a(f),a2=a(t);
    const x1o=cx+ro*Math.cos(a1),y1o=cy+ro*Math.sin(a1);
    const x2o=cx+ro*Math.cos(a2),y2o=cy+ro*Math.sin(a2);
    const x1i=cx+ri*Math.cos(a1),y1i=cy+ri*Math.sin(a1);
    const x2i=cx+ri*Math.cos(a2),y2i=cy+ri*Math.sin(a2);
    const lg=t-f>50?1:0;
    return `<path d="M${x1o.toFixed(1)},${y1o.toFixed(1)} A${ro},${ro} 0 ${lg},1 ${x2o.toFixed(1)},${y2o.toFixed(1)} L${x2i.toFixed(1)},${y2i.toFixed(1)} A${ri},${ri} 0 ${lg},0 ${x1i.toFixed(1)},${y1i.toFixed(1)}Z" fill="${c}" opacity=".9"/>`;
  };
  const na=a(score);const nlen=ri-5;
  const nx=cx+nlen*Math.cos(na),ny=cy+nlen*Math.sin(na);
  return `<div style="text-align:center">
    <svg width="120" height="62" viewBox="0 0 120 62">
      ${seg(0,25,'#ef4444')}${seg(25,45,'#f97316')}${seg(45,55,'#eab308')}${seg(55,75,'#84cc16')}${seg(75,100,'#10b981')}
      <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="#161b22"/><circle cx="${cx}" cy="${cy}" r="2.5" fill="white"/>
    </svg>
    <div style="font-size:1.05em;font-weight:800;color:${color};margin-top:-6px">${score}</div>
    <div style="font-size:.68em;color:${color};font-weight:700">${label}</div>
  </div>`;
}

function mktChgBadge(val,vixInv,extraCls){
  if(val===null||val===undefined)return'';
  const cls=val===0?'mkt2-neu':(vixInv?(val>0?'mkt2-neg':'mkt2-pos'):(val>0?'mkt2-pos':'mkt2-neg'));
  return `<span class="mkt2-chg-badge ${cls}${extraCls?' '+extraCls:''}">${val>=0?'+':''}${val.toFixed(2)}%</span>`;
}

    {key:'BTC', label:'BTC',  fmt:'usd'},
  ];
  const commCards=commKeys.map(c=>{
    const m=gv(c.key);
    const price=m?m.price:0;
    const d_=m?m.daily:0;
    const priceStr=price?fmtMktPrice(price,c.fmt):'—';
    const spark=mkSparkSvg(m?m.weekly:0,d_,c.key,54,22);
    return `<div class="mkt2-comm-card">
      <div class="mkt2-comm-lbl">${c.label}</div>
      <div class="mkt2-comm-price">${priceStr}</div>
      ${mktChgBadge(d_,false)}
      <div style="margin-top:4px">${spark}</div>
    </div>`;
  }).join('');

  // ── 인기 ETF ──
  const etfKeys=[
    {key:'QQQ', label:'QQQ'},
    {key:'SPY', label:'SPY'},
    {key:'TLT', label:'TLT'},
    {key:'SOXX',label:'SOXX'},
    {key:'GLD', label:'GLD'},
    {key:'TQQQ',label:'TQQQ'},
  ];
  const etfCards=etfKeys.map(c=>{
    const m=gv(c.key);
    const price=m?m.price:0;
    const d_=m?m.daily:0;
    return `<div class="mkt2-etf-card">
      <div class="mkt2-etf-lbl">${c.label}</div>
      <div class="mkt2-etf-price">${price?'$'+price.toFixed(2):'—'}</div>
      ${mktChgBadge(d_,false)}
    </div>`;
  }).join('');

  // ── 빅테크 ──
  const techKeys=[
    {key:'NVDA', label:'NVDA'},
    {key:'GOOGL',label:'GOOGL'},
    {key:'AAPL', label:'AAPL'},
    {key:'MSFT', label:'MSFT'},
    {key:'AMZN', label:'AMZN'},
    {key:'META', label:'META'},
    {key:'TSLA', label:'TSLA'},
    {key:'AVGO', label:'AVGO'},
  ];
  const techCards=techKeys.map(c=>{
    const m=gv(c.key);
    const price=m?m.price:0;
    const d_=m?m.daily:0;
    return `<div class="mkt2-tech-card">
      <div class="mkt2-tech-left">
        <div class="mkt2-tech-lbl">${c.label}</div>
        <div class="mkt2-tech-price">${price?'$'+price.toFixed(2):'—'}</div>
      </div>
      ${mktChgBadge(d_,false)}
    </div>`;
  }).join('');

  d.innerHTML=`<div class="mkt2-wrap">
    <div class="mkt2-hdr">
      <span style="font-size:.95em;font-weight:800;color:#e6edf3">🌐 시장 현황</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="mkt-badge" style="color:${st.color};background:${st.bg}">${st.label}</span>
        <button class="mkt-refresh-btn" id="btnMktRefresh" style="font-size:.78em;color:#8b949e">오후 ${lastUpd} 🔄</button>
      </div>
    </div>

    <div class="mkt2-section">
      <div class="mkt2-stitle">📊 주요 지수</div>
      <div class="mkt2-idx-grid">${idxCards}</div>
    </div>

    <div class="mkt2-section">
      <div class="mkt2-stitle">💡 시장 심리</div>
      <div class="mkt2-sent-grid">${sentHtml}</div>
    </div>

    <div class="mkt2-section">
      <div class="mkt2-stitle">💹 금리 & 환율</div>
      ${rateRows}
    </div>

    <div class="mkt2-section">
      <div class="mkt2-stitle">🏆 원자재 & 암호화폐</div>
      <div class="mkt2-comm-grid">${commCards}</div>
    </div>

    <div class="mkt2-section">
      <div class="mkt2-stitle">📈 인기 ETF</div>
      <div class="mkt2-etf-grid">${etfCards}</div>
    </div>

    <div class="mkt2-section">
      <div class="mkt2-stitle">💻 빅테크</div>
      <div class="mkt2-tech-grid">${techCards}</div>
    </div>
  </div>`;
  return d;
}

// ═══════════════════════════════════════════
// 이벤트 바인딩
// ═══════════════════════════════════════════
function bind(){
  const q=s=>document.querySelector(s);
  const qa=s=>document.querySelectorAll(s);
  const close=()=>{S.modal=null;render();};

  q("#btnTrend")?.addEventListener("click",()=>{S.tab="trend";render();});
  q("#btnSync")?.addEventListener("click",syncSheets);
  q("#btnSettings")?.addEventListener("click",()=>{S.modal={type:"settings"};render();});
  q("#saveApiUrl")?.addEventListener("click",()=>{
    const url=q("#apiUrlInp")?.value?.trim();
    if(!url)return alert("URL을 입력해주세요");
    setApiUrl(url);
    S.syncMsg="✅ API URL 저장 완료 — 동기화 버튼을 눌러 연결을 확인해보세요";
    S.modal=null;render();
  });
  q("#btnBulk")?.addEventListener("click",()=>{S.modal={type:"bulk"};render();});
  q("#btnAdd")?.addEventListener("click",()=>{S.modal={type:"add"};render();});
  q("#btnExport")?.addEventListener("click",()=>{S.modal={type:"export"};render();});
  q("#btnCashToggle")?.addEventListener("click",()=>{S.showCash=!S.showCash;render();});
  q("#btnTrendToggle")?.addEventListener("click",()=>{S.showTrend=!S.showTrend;render();});
  q("#mc")?.addEventListener("click",close);
  q("#mc2")?.addEventListener("click",close);
  q("#mbg")?.addEventListener("click",e=>{if(e.target===q("#mbg"))close();});
  q("#rateInp")?.addEventListener("change",e=>{S.rate=parseFloat(e.target.value)||1510;save();render();});

  qa(".flt[data-acct]").forEach(el=>el.addEventListener("click",()=>{S.acct=el.dataset.acct;render();}));
  qa(".tab[data-tab]").forEach(el=>el.addEventListener("click",()=>{
    S.tab=el.dataset.tab;render();
    if(el.dataset.tab==="market")loadMarketData();
  }));
  q("#btnMktRefresh")?.addEventListener("click",()=>loadMarketData(true));
  if(S.tab==="market"&&!S.marketData&&!S.marketLoading)setTimeout(loadMarketData,50);
  qa(".flt[data-wmode]").forEach(el=>el.addEventListener("click",()=>{S.wMode=el.dataset.wmode;render();}));
  qa("[data-cview]").forEach(el=>el.addEventListener("click",()=>{S.chartView=el.dataset.cview;render();}));
  qa("[data-sort]").forEach(el=>el.addEventListener("click",()=>{
    if(S.sortBy===el.dataset.sort)S.sortDir=S.sortDir==="desc"?"asc":"desc";
    else{S.sortBy=el.dataset.sort;S.sortDir="desc";}
    render();
  }));
  q("#btnView")?.addEventListener("click",()=>{S.viewMode=S.viewMode==="table"?"card":"table";render();});
  qa("[data-action]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    S.modal={type:"stockAction",stockId:+b.dataset.action};render();
  }));
  q("#actBuy")?.addEventListener("click",()=>{const id=S.modal.stockId;S.modal={type:"trade",stockId:id,mode:"buy"};render();});
  q("#actSell")?.addEventListener("click",()=>{const id=S.modal.stockId;S.modal={type:"trade",stockId:id,mode:"sell"};render();});
  q("#actEdit")?.addEventListener("click",()=>{const id=S.modal.stockId;S.modal={type:"edit",stockId:id};render();});
  q("#actDel")?.addEventListener("click",()=>{
    const s=S.stocks.find(x=>x.id===S.modal.stockId);
    if(s&&confirm(`'${s.name}' 삭제할까요?`)){S.stocks=S.stocks.filter(x=>x.id!==s.id);save();S.modal=null;render();}
  });
  q("#actPrice")?.addEventListener("change",e=>{
    const s=S.stocks.find(x=>x.id===S.modal?.stockId);
    if(s){s.cur=parseFloat(e.target.value)||s.cur;save();render();}
  });
  qa(".flt[data-period]").forEach(el=>el.addEventListener("click",()=>{S.trendPeriod=el.dataset.period;render();}));
  qa(".flt[data-jfilt]").forEach(el=>el.addEventListener("click",()=>{S.jFilter=el.dataset.jfilt;render();}));
  
  q("#btnAddJournal")?.addEventListener("click",()=>{S.modal={type:"addJournal"};render();});
  qa("[data-jdel]").forEach(b=>b.addEventListener("click",()=>delJournal(+b.dataset.jdel)));

  qa(".cur-inp").forEach(inp=>inp.addEventListener("change",e=>{
    const s=S.stocks.find(x=>x.id===+e.target.dataset.id);
    if(s){s.cur=parseFloat(e.target.value)||s.cur;save();render();}
  }));
  
  qa(".cbtn-buy,.cbtn-sell").forEach(b=>b.addEventListener("click",()=>{
    S.modal={type:"trade",stockId:+b.dataset.id,mode:b.dataset.mode};render();
  }));

  qa("[data-del]").forEach(b=>b.addEventListener("click",()=>{
    const s=S.stocks.find(x=>x.id===+b.dataset.del);
    if(s&&confirm(`'${s.name}' 삭제할까요?`)){S.stocks=S.stocks.filter(x=>x.id!==+b.dataset.del);save();render();}
  }));
  
  qa("[data-edit]").forEach(b=>b.addEventListener("click",()=>{
    S.modal={type:"edit",stockId:+b.dataset.edit};render();
  }));
  
  qa("[data-edit-tag]").forEach(el=>el.addEventListener("click",()=>{
    S.modal={type:"editTag",stockId:+el.dataset.editTag};render();
  }));
  
  qa("[data-pick-tag]").forEach(b=>b.addEventListener("click",()=>{
    const s=S.stocks.find(x=>x.id===S.modal.stockId);
    if(s){s.tag=b.dataset.pickTag;save();render();}
  }));
  
  q("#addTagBtn")?.addEventListener("click",()=>{
    const name=q("#newTagName").value.trim();
    const color=q("#newTagColor").value;
    if(!name)return alert("태그 이름 입력");
    if(S.tags.includes(name))return alert("이미 존재하는 태그");
    S.tags.push(name);
    S.tagColors[name]=color;
    save();render();
  });
  
  qa("[data-del-tag]").forEach(b=>b.addEventListener("click",()=>{
    const t=b.dataset.delTag;
    const used=S.stocks.filter(s=>s.tag===t).length;
    let msg=`'${t}' 태그 삭제할까요?`;
    if(used>0)msg+=`\n(${used}개 종목이 이 태그를 쓰고 있어요. 태그가 비워집니다)`;
    if(!confirm(msg))return;
    S.tags=S.tags.filter(x=>x!==t);
    delete S.tagColors[t];
    S.stocks.forEach(s=>{if(s.tag===t)s.tag="";});
    save();render();
  }));
  
  qa("[data-cash-in]").forEach(b=>b.addEventListener("click",()=>{
    S.modal={type:"cashIn",target:b.dataset.cashIn};render();
  }));
  qa("[data-cash-out]").forEach(b=>b.addEventListener("click",()=>{
    S.modal={type:"cashOut",target:b.dataset.cashOut};render();
  }));
  
  qa("[data-txn-undo]").forEach(b=>b.addEventListener("click",()=>undoTrade(+b.dataset.txnUndo)));
  qa("[data-cash-undo]").forEach(b=>b.addEventListener("click",()=>undoCashTxn(+b.dataset.cashUndo)));

  // 거래 미리보기
  const upPrev=()=>{
    const q2=parseFloat(q("#tq")?.value||0),p=parseFloat(q("#tp")?.value||0);
    const s=S.stocks.find(x=>x.id===S.modal?.stockId),prev=q("#tprev");
    if(!prev||!s||!q2||!p)return;
    const c=S.cash[s.acct]?.[s.curr]||0;
    if(S.modal.mode==="buy"){
      const na=(s.qty*s.avg+q2*p)/(s.qty+q2);
      const cost=q2*p;
      prev.innerHTML=`<div><span>새 평균단가</span><span>${fM(na,s.curr)}</span></div>
        <div><span>새 수량</span><span>${s.qty+q2}</span></div>
        <div><span>매수금액</span><span>${fM(cost,s.curr)}</span></div>
        <div><span>거래 후 현금</span><span class="${c-cost<0?'neg':''}">${fM(c-cost,s.curr)}</span></div>`;
    }else{
      const pnl=(p-s.avg)*q2;
      const cost=q2*p;
      prev.innerHTML=`<div><span>실현손익</span><span class="${pnl>=0?'pos':'neg'}">${fM(pnl,s.curr)}</span></div>
        <div><span>남은수량</span><span>${s.qty-q2}</span></div>
        <div><span>거래 후 현금</span><span>${fM(c+cost,s.curr)}</span></div>`;
    }
  };
  q("#tq")?.addEventListener("input",upPrev);
  q("#tp")?.addEventListener("input",upPrev);

  // 모달 안의 실행 버튼들 (💡 여기에 티커 전송 로직이 완벽하게 포함됨!)
  q("#exec")?.addEventListener("click",()=>{
    if(S.modal.type==="trade")execTrade(S.modal.stockId,S.modal.mode,q("#tq").value,q("#tp").value);
    
    if(S.modal.type==="add"||S.modal.type==="edit"){
      const name=q("#an").value.trim();
      if(!name)return alert("종목명 입력");
      
      const data={
        name,
        acct:q("#aa").value,
        curr:q("#ac").value,
        qty:parseFloat(q("#aq").value)||0,
        avg:parseFloat(q("#aavg").value)||0,
        cur:parseFloat(q("#acur").value)||0,
        tag:q("#at").value,
        ticker:q("#aticker")?.value.trim()||"" // 💡 티커를 무조건 저장합니다
      };
      
      if(S.modal.type==="edit"){
        const s=S.stocks.find(x=>x.id===S.modal.stockId);
        if(s)Object.assign(s,data);
      }else{
        data.id=Math.max(0,...S.stocks.map(s=>s.id))+1;
        S.stocks.push(data);
      }
      save();S.modal=null;render();
    }
    
    if(S.modal.type==="bulk"){
      const r=parseFloat(q("#br").value);if(r>0)S.rate=r;
      qa(".bulk-inp").forEach(inp=>{const s=S.stocks.find(x=>x.id===+inp.dataset.id);const v=parseFloat(inp.value);if(s&&v>0)s.cur=v;});
      save();S.modal=null;render();
    }
    
    if(S.modal.type==="cashIn"||S.modal.type==="cashOut"){
      const [acct,curr]=S.modal.target.split("|");
      execCash(acct,curr,S.modal.type==="cashIn"?"in":"out",q("#cashAmt").value,q("#cashMemo").value);
    }
    
    if(S.modal.type==="addJournal"){
      execJournal(q("#jstock").value,q("#jcat").value,q("#jcontent").value);
    }
  });
  
  // ☁️ 시트 업로드
  q("#execSheetUpload")?.addEventListener("click",async()=>{
    const btn=q("#execSheetUpload");
    btn.textContent="⏳ 업로드 중...";btn.disabled=true;
    try{
      const payload={
        _action:'export',
        stocks:S.stocks,cash:S.cash,cashTxns:S.cashTxns,txns:S.txns,
        snapshots:S.snapshots,journal:S.journal,
        tags:S.tags,tagColors:S.tagColors,rate:S.rate,
        updatedAt:new Date().toISOString()
      };
      const _u=getApiUrl();
      if(!_u)throw new Error("API URL 미설정 — ⚙️ 설정에서 입력해주세요");
      await fetch(_u,{
        method:"POST",mode:"no-cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify(payload)
      });
      btn.textContent="✅ 반영 완료!";
      S.syncMsg=`✅ 시트에 잔고 반영 완료 (${new Date().toLocaleTimeString()})`;
      setTimeout(()=>{S.modal=null;render();},1500);
    }catch(e){
      btn.textContent="☁️ 시트로 업로드";
      btn.disabled=false;
      alert("❌ 업로드 실패: "+e.message);
    }
  });
}

load();
// Auto-open settings if API URL is not configured yet
if(!getApiUrl()){S.modal={type:"settings"};}
render();
// Auto-sync on page load (only if API URL is configured)
if(getApiUrl())setTimeout(()=>loadFromCloud(false),2000);
</script>
</body>
</html>
