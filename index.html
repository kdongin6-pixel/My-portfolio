<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
/* CSS 스타일은 이전과 동일 */
body{background:#0d1117;color:#e6edf3;font-family:sans-serif;margin:0}
.hdr{background:#161b22;padding:20px;border-bottom:1px solid #30363d}
.card{background:#1c2128;margin:10px;padding:15px;border-radius:10px;border:1px solid #30363d}
.btn{padding:8px 12px;margin:5px;background:#238636;color:white;border:none;border-radius:5px;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>

<script>
// 1. 데이터 관리 (앱이 로드될 때 실행)
let S = {
    stocks: JSON.parse(localStorage.getItem("pf_v2_stocks") || "[]"),
    rate: parseFloat(localStorage.getItem("pf_rate")) || 1380,
    sheetsId: localStorage.getItem("pf_sheetsId") || ""
};

// 2. 환율 연동 (B3 셀 타겟)
async function syncRate() {
    if(!S.sheetsId) S.sheetsId = prompt("구글 시트 ID를 입력하세요:");
    localStorage.setItem("pf_sheetsId", S.sheetsId);
    try {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${S.sheetsId}/gviz/tq?tqx=out:csv&sheet=메리츠증권&range=B3:B3`);
        const text = await res.text();
        const val = parseFloat(text.split('\n')[1]?.replace(/[^0-9.]/g,""));
        if(!isNaN(val)) { 
            S.rate = val; 
            localStorage.setItem("pf_rate", val);
            alert("환율 연동 완료: ₩" + val); 
            render(); 
        }
    } catch(e) { alert("연동 실패"); }
}

// 3. 화면 렌더링 (DOM이 로드된 후 실행되도록 보장)
function render() {
    const app = document.getElementById("app");
    if(!app) return; // 안전장치

    app.innerHTML = `
        <div class="hdr">
            <h2>총 자산: ₩${Math.round(S.stocks.reduce((a,s)=>a+(s.qty*s.cur*S.rate),0)).toLocaleString()}</h2>
            <button class="btn" onclick="syncRate()">🔄 B3 환율 연동</button>
        </div>
        <div id="list"></div>
    `;

    document.getElementById("list").innerHTML = S.stocks.map(s => `
        <div class="card">
            <div><b>${s.name}</b> (${s.tag || '기타'})</div>
            <div style="font-size:0.85em;color:#8b949e">수량: ${s.qty} | 평단: ${s.avg} | 현재가: ${s.cur}</div>
            <button class="btn" onclick="editStock(${s.id})">📝 수정</button>
            <button class="btn" onclick="deleteStock(${s.id})" style="background:#f43f5e">🗑 삭제</button>
        </div>
    `).join('');
}

// 4. 기능 함수
window.editStock = (id) => {
    const s = S.stocks.find(x => x.id === id);
    s.tag = prompt("태그 수정:", s.tag || "") || s.tag;
    localStorage.setItem("pf_v2_stocks", JSON.stringify(S.stocks));
    render();
};
window.deleteStock = (id) => {
    if(confirm("삭제할까요?")) { 
        S.stocks = S.stocks.filter(x => x.id !== id); 
        localStorage.setItem("pf_v2_stocks", JSON.stringify(S.stocks));
        render(); 
    }
};

// 5. 앱 실행
window.onload = render;
</script>
</body>
</html>
