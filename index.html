<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>포트폴리오</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
/* ... (이전과 동일한 다크 테마 스타일 유지) ... */
body{background:#0d1117;color:#e6edf3;font-family:sans-serif}
.hdr{background:#161b22;padding:20px}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d}
.tab{flex:1;padding:15px;text-align:center;color:#8b949e}
.tab.on{color:#a5b4fc;border-bottom:2px solid #6366f1}
.card{background:#1c2128;margin:10px;padding:15px;border-radius:12px;border:1px solid #30363d}
.btn{padding:8px 12px;margin:5px;background:#21262d;border:1px solid #30363d;color:white;border-radius:6px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// 1. 이미지 기준 최신 데이터 적용
let S = {
    stocks: [
        {id:1, name:"나비타스 세미컨덕터", qty:877, avg:20.3280, cur:28.4150, curr:"USD", tag:"성장주", acct:"메리츠증권"},
        {id:2, name:"GE베르노바", qty:16, avg:813.8956, cur:1052.5, curr:"USD", tag:"성장주", acct:"메리츠증권"},
        {id:3, name:"알파벳 A", qty:41, avg:239.1231, cur:386.8, curr:"USD", tag:"성장주", acct:"메리츠증권"},
        {id:4, name:"현금(USD)", qty:2656, avg:1, cur:1, curr:"USD", tag:"현금", acct:"메리츠증권"}
    ],
    rate: 1380,
    tab: "list",
    sheetsId: ""
};

function save(){ localStorage.setItem("pf_v2", JSON.stringify(S)); }

// 2. B3 셀 환율 연동 로직
async function syncRate() {
    if(!S.sheetsId) S.sheetsId = prompt("구글 시트 ID를 입력하세요:");
    try {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${S.sheetsId}/gviz/tq?tqx=out:csv&sheet=메리츠증권&range=B3:B3`);
        const text = await res.text();
        const val = parseFloat(text.split('\n')[1]?.replace(/[^0-9.]/g,""));
        if(!isNaN(val)) { S.rate = val; alert("환율 연동 성공: ₩" + val); save(); render(); }
    } catch(e) { alert("연동 실패"); }
}

// 3. 화면 그리기
function render() {
    const app = document.getElementById("app");
    app.innerHTML = `
        <div class="hdr">
            <h2>총 자산: ₩${Math.round(S.stocks.reduce((a,s)=>a+(s.curr==="USD"?s.qty*s.cur*S.rate:s.qty*s.cur),0)).toLocaleString()}</h2>
            <button class="btn" onclick="syncRate()">🔄 B3 환율 연동</button>
        </div>
        <div class="tabs">
            <div class="tab ${S.tab==='list'?'on':''}" onclick="S.tab='list';render()">📋 종목 잔고</div>
            <div class="tab ${S.tab==='chart'?'on':''}" onclick="S.tab='chart';render()">📊 계좌별 비중</div>
        </div>
        <div id="content"></div>
    `;

    const content = document.getElementById("content");
    if(S.tab === 'list') {
        content.innerHTML = S.stocks.map(s => `
            <div class="card">
                <div><b>${s.name}</b> (${s.tag})</div>
                <div style="font-size:0.85em;color:#8b949e">수량: ${s.qty} | 평단: ${s.avg} | 현재가: ${s.cur}</div>
                <button class="btn" onclick="editStock(${s.id})">📝 태그수정</button>
                <button class="btn" onclick="deleteStock(${s.id})">🗑 삭제</button>
            </div>
        `).join('');
    } else {
        // 계좌별 비중 차트
        content.innerHTML = `<div class="card">계좌별 비중 데이터 반영 예정</div>`;
    }
}

// 4. 기능 함수
window.editStock = (id) => {
    const s = S.stocks.find(x => x.id === id);
    s.tag = prompt("태그 수정:", s.tag) || s.tag;
    save(); render();
};
window.deleteStock = (id) => {
    if(confirm("삭제할까요?")) { S.stocks = S.stocks.filter(x => x.id !== id); save(); render(); }
};

// 초기 로드
load(); render();
function load(){ const d=JSON.parse(localStorage.getItem("pf_v2")||"{}"); if(d.stocks) S={...S,...d}; }
</script>
</body>
</html>
