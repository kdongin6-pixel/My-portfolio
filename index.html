<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>포트폴리오</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
/* (이전과 동일한 디자인 적용) */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;font-size:15px;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,select,textarea{font-family:inherit;outline:none;color:#e6edf3}
.hdr{background:linear-gradient(160deg,#1e1b4b 0%,#0f172a 100%);padding:16px;border-bottom:1px solid #30363d}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hdr-title{font-size:1.15em;font-weight:800;color:#a5b4fc}
.sync-btn{background:rgba(99,102,241,.25);border:1px solid rgba(99,102,241,.5);color:#a5b4fc;padding:8px 14px;border-radius:10px;font-size:.82em;font-weight:700}
.asset-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.asset-card{background:rgba(255,255,255,.06);border:1px solid #30363d;border-radius:12px;padding:10px 12px}
.ac-lbl{font-size:.7em;color:#8b949e}
.ac-val{font-size:1.05em;font-weight:800}
.btn-row{display:flex;gap:6px;margin-bottom:4px;flex-wrap:nowrap;overflow-x:auto}
.hdr-btn{padding:9px 8px;border-radius:10px;font-size:.78em;font-weight:700;background:rgba(255,255,255,.1);border:1px solid #30363d;color:#e6edf3}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:13px 0;text-align:center;font-size:.82em;font-weight:700;color:#8b949e;border-bottom:2px solid transparent}
.tab.on{color:#a5b4fc;border-bottom-color:#6366f1}
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:14px;margin:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#1c2128;width:90%;max-width:400px;padding:20px;border-radius:20px}
.pos{color:#10b981} .neg{color:#f43f5e}
</style>
</head>
<body>
<div id="app"></div>
<script>
// 데이터 로드
let S={stocks:[],txns:[],rate:1380,tab:"list",acct:"전체",modal:null,syncMsg:""};
function load(){
    const d=JSON.parse(localStorage.getItem("pf_v2")||"{}");
    if(d.stocks) S={...S,...d};
    else S.stocks=[{id:1,name:"GE베르노바",qty:16,avg:313,cur:342,curr:"USD",tag:"성장주",acct:"메리츠증권"}]; // 초기값 예시
}
function save(){localStorage.setItem("pf_v2",JSON.stringify(S));}

// 핵심 함수: 시트 연동 + 환율 B3 자동 로드
async function syncSheets(){
    S.syncMsg="⏳ 연동 중..."; render();
    try {
        // 환율 B3 가져오기
        const rRes = await fetch(`https://docs.google.com/spreadsheets/d/${S.sheetsId}/gviz/tq?tqx=out:csv&sheet=메리츠증권&range=B3:B3`);
        const rText = await rRes.text();
        const val = parseFloat(rText.split('\n')[1]?.replace(/[^0-9.]/g,""));
        if(!isNaN(val)) S.rate = val;

        // 종목 동기화 로직... (이전 코드와 동일)
        S.syncMsg = `✅ 연동 완료! 환율: ₩${S.rate}`;
    } catch(e) { S.syncMsg = "❌ 연동 실패"; }
    save(); render();
}

function render(){
    const app=document.getElementById("app");
    app.innerHTML=`
        <div class="hdr">
            <div class="hdr-row1"><div class="hdr-title">📊 포트폴리오</div><button id="btnSync">🔄 연동</button></div>
            <div class="asset-cards">
                <div class="asset-card"><div class="ac-lbl">총 자산</div><div class="ac-val">₩${S.stocks.reduce((a,s)=>a+(s.curr==="USD"?s.qty*s.cur*S.rate:s.qty*s.cur),0).toLocaleString()}</div></div>
            </div>
            <div class="btn-row">
                <button id="btnBulk" class="hdr-btn">📝 입력</button>
                <button id="btnAdd" class="hdr-btn">+ 종목</button>
            </div>
        </div>
        <div class="tabs">
            <div class="tab ${S.tab==='list'?'on':''}" data-tab="list">📋 종목</div>
            <div class="tab ${S.tab==='txn'?'on':''}" data-tab="txn">📒 거래</div>
        </div>
        <div id="content"></div>
    `;
    
    // 종목 카드 출력
    const content = document.getElementById("content");
    if(S.tab === 'list') {
        content.innerHTML = S.stocks.map(s => `
            <div class="card">
                <div>${s.name} (${s.tag})</div>
                <button onclick="editStock(${s.id})">📝 수정</button>
                <button onclick="deleteStock(${s.id})">🗑 삭제</button>
            </div>
        `).join('');
    }

    // 버튼 바인딩
    document.getElementById("btnSync").onclick = syncSheets;
    document.getElementById("btnBulk").onclick = () => {S.modal={type:"bulk"}; render();};
    document.getElementById("btnAdd").onclick = () => {S.modal={type:"add"}; render();};
    document.querySelectorAll(".tab").forEach(t=>t.onclick=(e)=>{S.tab=e.target.dataset.tab; render();});
}

// 태그 수정 기능
window.editStock = (id) => {
    const s = S.stocks.find(x=>x.id===id);
    const newTag = prompt("태그 수정 (성장주, 방어주 등):", s.tag);
    if(newTag) { s.tag = newTag; save(); render(); }
};

window.deleteStock = (id) => {
    if(confirm("정말 삭제?")) { S.stocks = S.stocks.filter(x=>x.id!==id); save(); render(); }
};

load(); render();
</script>
</body>
</html>
