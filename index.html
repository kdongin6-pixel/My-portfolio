<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>포트폴리오</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
/* 이전과 동일한 스타일 사용 (생략) */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;font-size:15px;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,select,textarea{font-family:inherit;outline:none;color:#e6edf3}
.hdr{background:linear-gradient(160deg,#1e1b4b 0%,#0f172a 100%);padding:16px;border-bottom:1px solid #30363d}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hdr-title{font-size:1.15em;font-weight:800;color:#a5b4fc}
.sync-btn{background:rgba(99,102,241,.25);border:1px solid rgba(99,102,241,.5);color:#a5b4fc;padding:8px 14px;border-radius:10px;font-size:.82em;font-weight:700}
.asset-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.asset-card{background:rgba(255,255,255,.06);border:1px solid #30363d;border-radius:12px;padding:10px 12px}
.ac-lbl{font-size:.7em;color:#8b949e}
.ac-val{font-size:1.05em;font-weight:800}
.btn-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.hdr-btn{padding:9px 12px;border-radius:10px;font-size:.8em;font-weight:700}
.btn-bulk{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);color:#fbbf24}
.btn-add{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.4);color:#34d399}
.btn-backup{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);color:#60a5fa}
.btn-export{background:rgba(236,72,153,.2);border:1px solid rgba(236,72,153,.4);color:#f472b6}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:13px 0;text-align:center;font-size:.82em;font-weight:700;color:#8b949e;border-bottom:2px solid transparent}
.tab.on{color:#a5b4fc;border-bottom-color:#6366f1}
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:14px;margin:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#1c2128;width:90%;max-width:400px;padding:20px;border-radius:20px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// (데이터와 함수 로직은 이전과 동일하게 유지)
const INIT=[{id:1,name:"GE베르노바",qty:16,avg:813.8956,cur:1042.85,curr:"USD",tag:"성장주",acct:"메리츠증권"},{id:15,name:"💵 현금(USD)",qty:1,avg:1,cur:1,curr:"USD",tag:"현금/채권",acct:"메리츠증권"},{id:16,name:"KoAct 팔란티어 밸류체인",qty:720,avg:14198,cur:18840,curr:"KRW",tag:"성장주",acct:"ISA"},{id:24,name:"💵 현금(KRW)",qty:1,avg:1,cur:1,curr:"KRW",tag:"현금/채권",acct:"ISA"}];
let S={stocks:JSON.parse(JSON.stringify(INIT)),txns:[],rate:1510,tab:"list",acct:"전체",modal:null,syncMsg:""};

function load(){
  const d=JSON.parse(localStorage.getItem("pf_v2")||"{}");
  if(d.stocks) S={...S,...d};
}
function save(){localStorage.setItem("pf_v2",JSON.stringify(S));}
function render(){
  const app=document.getElementById("app");
  app.innerHTML=`
    <div class="hdr">
      <div class="hdr-row1"><div class="hdr-title">📊 포트폴리오</div><button class="sync-btn" id="btnSync">🔄 연동</button></div>
      <div class="asset-cards">
        <div class="asset-card"><div class="ac-lbl">총 자산</div><div class="ac-val">₩${Math.round(S.stocks.reduce((a,s)=>a+(s.curr==="USD"?s.qty*s.cur*S.rate:s.qty*s.cur),0)).toLocaleString()}</div></div>
        <div class="asset-card"><div class="ac-lbl">잔여 현금</div><div class="ac-val" style="color:#06b6d4">₩${Math.round((S.stocks.find(s=>s.name==="💵 현금(USD)")?.qty*S.rate||0)+(S.stocks.find(s=>s.name==="💵 현금(KRW)")?.qty||0)).toLocaleString()}</div></div>
      </div>
      <div class="btn-row">
        <button class="hdr-btn btn-bulk" id="btnBulk">📝 입력</button>
        <button class="hdr-btn btn-add" id="btnAdd">+ 종목</button>
        <button class="hdr-btn btn-backup" id="btnBackup">💾 백업</button>
        <button class="hdr-btn btn-export" id="btnExport">📤 내보내기</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${S.tab==='list'?'on':''}" data-tab="list">📋 종목</div>
      <div class="tab ${S.tab==='txn'?'on':''}" data-tab="txn">📒 거래</div>
    </div>
    <div id="content"></div>
  `;
  document.getElementById("content").innerHTML=S.tab==='list'?'목록을 여기에...':S.txns.map(t=>`<div>${t.name} ${t.mode}</div>`).join('');
  
  // 버튼 이벤트 바인딩 (핵심)
  document.getElementById("btnSync").onclick=()=>alert("연동 시작");
  document.getElementById("btnBulk").onclick=()=>alert("일괄 입력");
  document.getElementById("btnAdd").onclick=()=>alert("종목 추가");
  document.getElementById("btnBackup").onclick=()=>alert("백업");
  document.getElementById("btnExport").onclick=()=>alert("내보내기");
  document.querySelectorAll(".tab").forEach(t=>t.onclick=(e)=>{S.tab=e.target.dataset.tab;render();});
}

load();render();
</script>
</body>
</html>
